<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#f5f2eb"/>
  <!-- Calendar body -->
  <rect x="4" y="8" width="24" height="20" rx="3" fill="none" stroke="#111" stroke-width="2"/>
  <!-- Calendar header bar -->
  <rect x="4" y="8" width="24" height="7" rx="3" fill="#c8392b"/>
  <rect x="4" y="12" width="24" height="3" fill="#c8392b"/>
  <!-- Rings -->
  <rect x="10" y="5" width="2.5" height="6" rx="1.2" fill="#111"/>
  <rect x="19.5" y="5" width="2.5" height="6" rx="1.2" fill="#111"/>
  <!-- Question mark -->
  <text x="16" y="25" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#111" text-anchor="middle">?</text>
</svg>
